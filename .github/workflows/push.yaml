name: 'Test'

on:
    push:
        branches-ignore:
            - main

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run linting
              run: npm run test:lint

            - name: Run unit tests
              run: npm run test:sass

            - name: Verify build
              run: npm run build
